version: '3.3'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: password
      POSTGRES_DB: polymarket
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./web:/usr/src/app
    environment:
      - DATABASE_URL=postgresql://polymarket:password@db:5432/polymarket?schema=public
    ports:
      - "5173:5173"
    command: /bin/sh -c "npm install && npm run dev -- --host"
    depends_on:
      - db

  bot:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./bot:/usr/src/app
    environment:
      - DISCORD_TOKEN=dummy
      - API_URL=http://web:5173
    command: /bin/sh -c "npm install && node index.js"
    depends_on:
      - web


